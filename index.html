<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episodic</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
  <header role="banner">
    <h1>Episodic</h1>
  </header>

  <main aria-label="main content">
    <!-- Search Bar -->
    <section id="search" aria-labelledby="search-heading">
      <h2 id="search-heading">Search Shows</h2>
      <div id="top-pick" aria-label="random top tv show pick">
        <h3>Our Top Picks</h3>
        <div id="top-pick-card">
          <img id="top-pick-image" alt="" />
          <div class="top-pick-info">
            <p id="top-pick-title"></p>
            <p id="top-pick-rating"></p>
          </div>
        </div>
        <button id="refresh-pick" type="button" aria-label="get a new show pick">Refresh</button>
      </div>
      
      <form id="search-form">
        
        <div class="form-group">
          <label for="search-input">Keyword</label>
          <input
          type="text"
          id="search-input"
          name="query"
          required
          />
        </div>
        <button type="submit">Search</button>
        <button type="button" id="reset-search" aria-label="reset search and show all" title="Reset">↻</button>
      </form>
    </section>
    
    <section id="TV-show-collection" aria-labelledby="shows-heading">
      <h2 id="shows-heading">Shows (<span id="shows-count">0</span>)</h2>
      <ul id="shows-list" aria-label="tv shows collection"></ul>
    </section>

    <!-- Modal Section: single item details-->
    <dialog id="show-details" aria-label="single tv show details" aria-live="polite">
      <div id="show-content">
        <div id="show-close-details-wrapper"><button id="show-close-details" aria-label="close modal"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg></button></div>
        <!-- This will facilitate the layout later on -->
        <div id="info-content">
          <figure id="image-content">
            <img src="https://static.tvmaze.com/uploads/images/original_untouched/610/1525272.jpg" alt="" id="show-image">
            <figcaption id="show-title">Title</figcaption>
          </figure>
          <div id="show-info">
            <p><strong>Streamed On:</strong> <span id="show-streamed"></span></p>
            <p><strong>Rating:</strong> <span id="show-rating"></span> / 10</p>
            <p><strong>Seasons:</strong> <span id="show-seasons"></span></p>
            <p><strong>Total Episodes:</strong> <span id="show-episodes"></span></p>
            <p><strong>Genres:</strong> <span id="show-genres"></span></p>
            <p><strong>Status:</strong> <span id="show-status"></span></p>
          </div>
        </div>
        <p id="show-summary"></p>
      </div>
    </dialog>
  </main>

  <footer role="contentinfo">
    <p id="built-by">Built by Ashar Zarrar & Jandir Gregorio · 2026</p>
  </footer>
  <script type="module" src="/src/main.js"></script>
  </body>
</html>
