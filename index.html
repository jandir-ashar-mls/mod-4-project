<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episodic</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>

    <section id="TV-show-collection">
      <h1>Episodic</h1>
      <ul id="shows-list"></ul>
    </section>

    <!-- Modal Section: single item details-->
    <section id="show-details" class="hidden">
      <div id="show-content">
        <div id="show-close-details-wrapper"><button id="show-close-details">X</button></div>
        <!-- This will facilitate the layout later on -->
        <div id="info-content">
          <figure id="image-content">
            <img src="https://static.tvmaze.com/uploads/images/original_untouched/610/1525272.jpg" alt="" id="show-image">
            <figcaption id="show-title">Title</figcaption>
          </figure>
          <div id="show-info">
            <p><strong>Streamed On:</strong> <span id="show-streamed"></span></p>
            <p><strong>Rating:</strong> <span id="show-rating"></span> / 10</p>
            <p><strong>Seasons:</strong> <span id="show-seasons"></span></p>
            <p><strong>Total Episodes:</strong> <span id="show-episodes"></span></p>
            <p><strong>Genres:</strong> <span id="show-genres"></span></p>
            <p><strong>Status:</strong> <span id="show-status"></span></p>
          </div>
        </div>
        <p id="show-summary">summary</p>
      </div>
    </section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
